name: Check if CI should run

on:
  workflow_call:
    outputs:
      should_run:
        description: 'Whether CI checks should run'
        value: ${{ jobs.check.outputs.should_run }}

jobs:
  check:
    name: determine if CI should run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: create master branch from remote master
        run: git branch master origin/master

      - name: detect changed files
        id: detect-changed-files
        run: |
          changed_files="$(mktemp)"
          git diff --diff-filter=d --name-only --no-renames -z master >"$changed_files"
          if [ -s "$changed_files" ]; then
            echo "has_changes=true" >>"$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >>"$GITHUB_OUTPUT"
          fi

      - name: decide if should run checks
        id: decide
        run: |
          should_run=false

          if [ "${{ steps.detect-changed-files.outputs.has_changes }}" = "true" ]; then
            should_run=true
          fi

          if [ "${{ github.event.pull_request.action }}" = "edited" ]; then
            old_body="${{ github.event.changes.body.from }}"
            new_body="${{ github.event.changes.body }}"
            old_has_flags=$(echo "$old_body" | grep -c 'SKIP_REMARK\|SKIP_WIKILINK_CHECK' || echo 0)
            new_has_flags=$(echo "$new_body" | grep -c 'SKIP_REMARK\|SKIP_WIKILINK_CHECK' || echo 0)

            if [ "$old_has_flags" != "$new_has_flags" ]; then
              should_run=true
            fi
          fi

          echo "should_run=$should_run" >>"$GITHUB_OUTPUT"
